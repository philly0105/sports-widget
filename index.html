<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Live sports scores for NFL, NBA, and MLB — desktop widget inspired by Apple Sports." />
  <title>Sports Widget</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="app-header" data-tauri-drag-region>
      <div class="header-left" data-tauri-drag-region>
        <img class="sports-icon" src="/logo.png" width="28" height="28" alt="" style="border-radius: 6px; object-fit: contain;" />
        <h1>Sports</h1>
      </div>
      <div class="header-actions">
        <button class="search-toggle" id="search-toggle" title="Search Teams">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </button>
        <button class="props-toggle" id="props-toggle" title="Prop Tracker">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="9"/>
            <circle cx="12" cy="12" r="4.5"/>
            <circle cx="12" cy="12" r="0.6" fill="currentColor"/>
          </svg>
          <span id="props-count-badge" class="props-count-badge" style="display:none;">0</span>
        </button>
        <button class="standings-toggle" id="standings-toggle" title="Standings">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="20" x2="18" y2="10"/>
            <line x1="12" y1="20" x2="12" y2="4"/>
            <line x1="6" y1="20" x2="6" y2="14"/>
          </svg>
        </button>
        <button class="refresh-btn" id="refresh-btn" title="Refresh scores">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"/>
            <polyline points="1 20 1 14 7 14"/>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Date Tabs -->
    <nav class="date-tabs">
      <button class="date-tab" data-offset="-1">Yesterday</button>
      <button class="date-tab active" data-offset="0">Today</button>
      <button class="date-tab" data-offset="1">Upcoming</button>
    </nav>

    <!-- Sport Filter Pills -->
    <div class="sport-filters">
      <button class="sport-pill active" data-league="all">All</button>
      <button class="sport-pill" data-league="nfl">🏈 NFL</button>
      <button class="sport-pill" data-league="nba">🏀 NBA</button>
      <button class="sport-pill" data-league="mlb">⚾ MLB</button>
      <button class="sport-pill" data-league="nhl">🏒 NHL</button>
      <button class="sport-pill" data-league="mls">⚽ MLS</button>
      <button class="sport-pill" data-league="epl">⚽ EPL</button>
      <button class="sport-pill" data-league="ucl">🏆 UCL</button>
      <button class="sport-pill" data-league="fifa.world">🌍 World Cup</button>
      <button class="sport-pill" data-league="ncaaf">🏈 NCAAF</button>
      <button class="sport-pill" data-league="ncaam">🏀 NCAAM</button>
    </div>

    <!-- Active Filter Banner -->
    <div id="filter-banner" class="filter-banner" style="display: none;"></div>

    <!-- Games Container -->
    <main id="games-container">
      <div class="loading-state">
        <div class="spinner"></div>
        <p>Loading scores...</p>
      </div>
    </main>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
